services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: aegisflow
      POSTGRES_USER: aegis
      POSTGRES_PASSWORD: aegis
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aegis"]
      interval: 5s
      timeout: 5s
      retries: 10
  api:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://aegis:aegis@db:5432/aegisflow
      CORS_ORIGINS: http://localhost:3000
    ports: ["8000:8000"]
    depends_on:
      db:
        condition: service_healthy
  web:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports: ["3000:3000"]
    depends_on: [api]
volumes:
  pgdata:
